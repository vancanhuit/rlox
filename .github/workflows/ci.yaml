name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Opt every JS-based action into the Node 24 runtime ahead of the
  # June 2 2026 GitHub Actions deadline. Actions explicitly bumped to
  # their Node 24 major below; this env var covers any transitive
  # JS-based dependency that hasn't shipped a Node 24 release yet.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        # `rust-toolchain.toml` pins the channel + components.
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets --locked

  # Same target matrix as the release workflow, but produces *development*
  # binaries on every PR and every push to main. The version label is
  # derived from `git describe --tags --always --dirty`, falling back to
  # `dev-<sha>` so a developer can always identify which commit a given
  # artifact came from. Artifacts are retained for 14 days; the release
  # workflow attaches the matching tarballs to a GitHub Release for tag
  # pushes.
  build:
    # Two axes: target architecture × backend feature.
    #   - features=tree (default) — the chapter 4-13 tree-walk interpreter.
    #     Smoke-tested against the full `.lox` corpus.
    #   - features=vm — the chapter 14+ bytecode VM. At chapter 17 it only
    #     handles a single expression per file; the smoke corpus broadens
    #     to cover it once chapter 21 (Globals) lands and the VM gains
    #     statements and `print`.
    name: Build (${{ matrix.target }}, ${{ matrix.features }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            features: tree
            cargo_features: ""
            backend_label: tree
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            features: vm
            cargo_features: "--no-default-features --features vm"
            backend_label: vm
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            features: tree
            cargo_features: ""
            backend_label: tree
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            features: vm
            cargo_features: "--no-default-features --features vm"
            backend_label: vm
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # `git describe --tags` needs the full tag graph.
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Per-(target, features) cache so the matrix legs don't thrash.
          key: ${{ matrix.target }}-${{ matrix.features }}

      - name: Resolve development version
        id: version
        run: |
          set -euo pipefail
          ver="$(git describe --tags --always --dirty 2>/dev/null || true)"
          if [[ -z "$ver" ]]; then
            ver="dev-${GITHUB_SHA::7}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Resolved development version: $ver"

      - name: Build release binary
        run: cargo build --release --locked --bin rlox ${{ matrix.cargo_features }}

      - name: Smoke-test the binary
        # Drives target/release/rlox against scripts/smoke/*.lox and asserts
        # on stdout / stderr / exit code per the //expect: directives.
        # `--no-build` reuses the artifact from the previous step.
        # The smoke corpus exercises full Lox programs (statements +
        # `print` + classes); the bytecode VM only catches up at
        # chapter 21, so for now smoke runs only on the tree-walk leg.
        if: matrix.features == 'tree'
        run: python3 scripts/smoke_test.py --no-build

      - name: Package binary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET: ${{ matrix.target }}
          BACKEND: ${{ matrix.backend_label }}
        run: |
          set -euo pipefail
          mkdir -p dist
          archive="rlox-${BACKEND}_${VERSION}_${TARGET}.tar.gz"
          stage="dist/rlox-${BACKEND}_${VERSION}_${TARGET}"
          mkdir -p "$stage"
          cp target/release/rlox "$stage/rlox"
          cp README.md LICENSE "$stage/" 2>/dev/null || true
          tar -czf "dist/$archive" -C dist "$(basename "$stage")"
          rm -rf "$stage"
          ( cd dist && sha256sum "$archive" > "$archive.sha256" )
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rlox-${{ matrix.backend_label }}-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: |
            dist/rlox-*.tar.gz
            dist/rlox-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 14
