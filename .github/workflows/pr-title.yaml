name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  conventional:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            perf
            chore
            ci
            build
            revert
          requireScope: false
          subjectPattern: ^[A-Za-z0-9].*[^.]$
          subjectPatternError: |
            The subject "{subject}" must start with an alphanumeric
            character and must not end with a period.
