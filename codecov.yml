coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

# `src/main.rs` is exercised end-to-end via subprocess smoke tests in
# `tests/cli.rs`, but `cargo llvm-cov` only instruments the parent process
# so those lines never show up in the lcov report. Excluding the file keeps
# the patch-coverage threshold meaningful for the library code.
ignore:
  - "src/main.rs"

comment:
  layout: "diff, files"
  require_changes: true
